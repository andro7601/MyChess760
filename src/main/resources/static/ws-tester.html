<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyChess760 Match Room</title>
    <link rel="stylesheet" href="ws-tester.css">
</head>
<body>
<header>
    <div>
        <h1>MyChess760</h1>
        <p class="subhead">Live match room</p>
    </div>
    <div id="status" class="status"><span class="status-dot"></span><span>Disconnected</span></div>
</header>

<main>
    <div class="layout">
        <section class="panel stack">
            <h2>Account</h2>
            <div class="row">
                <div>
                    <label for="username">Username</label>
                    <input id="username" value="player1" autocomplete="username">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input id="password" type="password" value="password123" autocomplete="current-password">
                </div>
            </div>
            <div class="actions">
                <button id="registerBtn" type="button">Register</button>
                <button id="loginBtn" class="primary" type="button">Login</button>
            </div>
            <div id="currentUserDisplay" class="profile-line"><span>User</span><strong>Not logged in</strong></div>
            <label for="token">JWT Token</label>
            <textarea id="token" spellcheck="false"></textarea>

            <h2>Connection</h2>
            <label for="baseUrl">HTTP Base URL</label>
            <input id="baseUrl">
            <div class="actions">
                <button id="connectBtn" class="primary" type="button">Connect</button>
                <button id="disconnectBtn" type="button" disabled>Disconnect</button>
            </div>

            <h2>Matchmaking</h2>
            <div class="actions">
                <button id="joinBtn" class="primary" type="button" disabled>Find Match</button>
                <button id="cancelBtn" class="danger" type="button" disabled>Leave Queue</button>
            </div>
            <label for="matchId">Match ID</label>
            <input id="matchId" readonly placeholder="Waiting for match">
            <div class="actions">
                <button id="reconnectBtn" type="button" disabled>Reconnect Match</button>
            </div>
            <div class="match-strip">
                <div class="match-line"><span>White</span><strong id="whiteIdText">-</strong></div>
                <div class="match-line"><span>Black</span><strong id="blackIdText">-</strong></div>
            </div>
        </section>

        <section class="panel board-panel">
            <div class="game-status">
                <div>
                    <div id="gameTurnIndicator" class="turn-title">Local board ready</div>
                    <div id="gameSubStatus" class="turn-subtitle">Ready</div>
                </div>
                <div id="playerColorIndicator" class="tag">No side</div>
            </div>

            <div id="queueBanner" class="queue-banner">
                <span style="display: inline-flex; align-items: center; gap: 9px;"><span class="spinner"></span> Searching</span>
                <button id="cancelBannerBtn" class="danger" type="button">Cancel</button>
            </div>

            <div id="drawAlertBanner" class="draw-banner">
                <span>Draw offer received</span>
                <button id="acceptDrawAlertBtn" class="primary" type="button">Accept</button>
            </div>

            <div id="topPlayer" class="player-bar">
                <div>
                    <div id="topPlayerName" class="player-name">Black</div>
                    <div id="topPlayerMeta" class="player-meta">Waiting</div>
                </div>
                <div id="topTimer" class="timer">10:00</div>
            </div>

            <div class="board-wrap">
                <div id="board" aria-label="Chess board"></div>
            </div>

            <div id="bottomPlayer" class="player-bar active">
                <div>
                    <div id="bottomPlayerName" class="player-name">White</div>
                    <div id="bottomPlayerMeta" class="player-meta">Ready</div>
                </div>
                <div id="bottomTimer" class="timer">10:00</div>
            </div>

            <div class="board-actions">
                <button id="localBtn" class="primary" type="button">Local Game</button>
                <button id="flipBtn" type="button">Flip</button>
                <button id="drawBtn" class="warning" type="button" disabled>Draw</button>
                <button id="resignBtn" class="danger" type="button" disabled>Resign</button>
            </div>
        </section>

        <section class="panel stack console-panel">
            <div class="console-head">
                <h2 style="border: 0; padding: 0;">Match Data</h2>
                <button id="clearBtn" type="button">Clear</button>
            </div>
            <div class="stack">
                <div>
                    <h3>Moves</h3>
                    <div id="moveList" class="move-list"></div>
                </div>
                <div class="raw-tools">
                    <h3>Raw Move</h3>
                    <input id="move" value="e2e4" aria-label="Raw UCI move">
                    <input id="moveDestination" placeholder="/app/match/{id}/move" aria-label="Raw move destination">
                    <button id="sendMoveBtn" type="button" disabled>Send Raw Move</button>
                </div>
                <div>
                    <h3>Console</h3>
                    <div id="log" role="log"></div>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="ws-tester.js"></script>
</body>
</html>
